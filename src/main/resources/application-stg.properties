# ============================================================
# CORS (frontend dev server)
# ============================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ============================================================
# Forwarded headers (Render.com reverse proxy)
# Required so Spring uses https:// and the correct hostname
# instead of the internal http://localhost:<port>
# ============================================================
server.forward-headers-strategy=FRAMEWORK

app.frontend-url=${FRONTEND_URL:https://read-sprinter-api.onrender.com}
