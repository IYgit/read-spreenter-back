# ============================================================
# CORS (frontend dev server)
# ============================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://api-cco.ngrok.app,https://web.api-cco.ngrok.app,http://localhost:3000}

# ============================================================
# Forwarded headers (ngrok proxy)
# Allows Spring to read X-Forwarded-Proto/Host from ngrok
# so SpringDoc generates the correct server URL in OpenAPI spec
# ============================================================
server.forward-headers-strategy=FRAMEWORK

app.frontend-url=${FRONTEND_URL:https://web.api-cco.ngrok.app}
